events {}
http {
  server {
    listen 443 ssl;
    ssl_certificate /etc/nginx/certs/tls.crt;
    ssl_certificate_key /etc/nginx/certs/tls.key;

    location /ingestion/ {
      proxy_pass http://flight-ingestion:8000/api/v1/;
    }
    location /analytics/ {
      proxy_pass http://flight-analytics:8080/api/v1/analytics/;
    }
  }
}
