apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: aerostream
spec:
  replicas: 2
  selector:
    matchLabels: { app: frontend }
  template:
    metadata:
      labels: { app: frontend }
    spec:
      containers:
        - name: app
          image: ghcr.io/example/aerostream-frontend:latest
          ports: [{ containerPort: 80 }]
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: aerostream
spec:
  selector: { app: frontend }
  ports: [{ port: 80, targetPort: 80 }]
