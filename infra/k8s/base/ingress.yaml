apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aerostream-ingress
  namespace: aerostream
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  tls:
    - hosts: ["aerostream.example.com"]
      secretName: aerostream-tls
  rules:
    - host: aerostream.example.com
      http:
        paths:
          - path: /api/ingestion
            pathType: Prefix
            backend: { service: { name: flight-ingestion, port: { number: 8000 } } }
          - path: /api/analytics
            pathType: Prefix
            backend: { service: { name: flight-analytics, port: { number: 8080 } } }
          - path: /
            pathType: Prefix
            backend: { service: { name: frontend, port: { number: 80 } } }
