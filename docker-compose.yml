version: '3.9'
services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on: [zookeeper]
    ports: ['9092:9092']
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: aerostream
      POSTGRES_USER: aerostream
      POSTGRES_PASSWORD: aerostream
    ports: ['5432:5432']
  mongo:
    image: mongo:7
    ports: ['27017:27017']
  flight-ingestion:
    build: ./services/flight-ingestion
    ports: ['8000:8000']
    environment:
      AVIATIONSTACK_API_KEY: ${AVIATIONSTACK_API_KEY}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on: [kafka]
  flight-analytics:
    build: ./services/flight-analytics
    ports: ['8080:8080']
    depends_on: [kafka, postgres, mongo]
  frontend:
    build: ./frontend
    ports: ['3000:80']
    depends_on: [flight-analytics]
  prometheus:
    image: prom/prometheus:v2.54.1
    volumes:
      - ./infra/observability/prometheus.yml:/etc/prometheus/prometheus.yml
    ports: ['9090:9090']
  grafana:
    image: grafana/grafana:11.2.2
    volumes:
      - ./infra/observability/grafana/provisioning:/etc/grafana/provisioning
      - ./infra/observability/grafana/dashboards:/var/lib/grafana/dashboards
    ports: ['3001:3000']
